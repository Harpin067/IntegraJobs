<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Detalle de vacante — IntegraJobs</title>
  <link rel="stylesheet" href="/css/theme.css">
  <style>
    .detail-card {
      background: #fff;
      border: 1px solid var(--color-border-2);
      border-radius: var(--radius-xl);
      box-shadow: 0 4px 20px -4px rgba(15,23,42,.08);
      padding: 2rem;
    }
    .company-card {
      background: var(--color-slate-50);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: 1.5rem;
    }
    .pill {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .35rem .875rem; border-radius: 999px;
      font-size: .8125rem; font-weight: 500;
      background: var(--color-primary-10); color: var(--color-primary);
    }
    .pill.green { background: rgba(16,185,129,.1); color: var(--color-secondary); }
    .pill.gray  { background: var(--color-border-2); color: var(--color-muted); }
    .postulate-btn {
      display: block; width: 100%; padding: 1rem;
      background: var(--color-primary); color: #fff;
      border: none; border-radius: var(--radius-lg);
      font-size: 1rem; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 16px rgba(26,86,219,.35);
      transition: background .15s, transform .15s;
      text-align: center;
    }
    .postulate-btn:hover { background: var(--color-primary-dk); transform: translateY(-1px); }
    .skeleton-line {
      height: 1rem; border-radius: var(--radius-sm);
      background: var(--color-border-2);
      animation: ij-pulse 1.5s ease-in-out infinite;
    }
  </style>
</head>
<body>

  <nav class="ij-public-nav">
    <a href="/" class="ij-brand">
      <img src="/img/logo.png" alt="IntegraJobs" style="height:48px;width:auto"
           onerror="this.style.display='none';document.getElementById('nav-fb').style.display='flex'">
      <span id="nav-fb" style="display:none;align-items:center;gap:.5rem">
        <span class="ij-brand-icon" id="nav-icon"></span>
        <span class="ij-brand-name">IntegraJobs</span>
      </span>
    </a>
    <ul>
      <li><a href="/">Inicio</a></li>
      <li><a href="/busqueda.html">Empleos</a></li>
      <li><a href="/pages/login.html?type=empresa">Empresas</a></li>
      <li><a href="/pages/registro-candidato.html">Candidatos</a></li>
    </ul>
    <div class="ij-flex ij-gap-2">
      <a href="/pages/login.html" class="ij-btn ij-btn-ghost ij-btn-sm">Iniciar sesión</a>
      <a href="/pages/registro.html" class="ij-btn ij-btn-primary ij-btn-sm">Registrarse gratis</a>
    </div>
  </nav>

  <!-- Breadcrumb -->
  <div style="background:var(--color-surface);border-bottom:1px solid var(--color-border-2);padding:.75rem 1.5rem">
    <div class="ij-container">
      <nav style="font-size:.8125rem;color:var(--color-muted)">
        <a href="/" style="color:var(--color-muted)">Inicio</a>
        <span style="margin:0 .5rem">›</span>
        <a href="/busqueda.html" style="color:var(--color-muted)">Empleos</a>
        <span style="margin:0 .5rem">›</span>
        <span id="breadcrumbTitulo" style="color:var(--color-text)">Cargando...</span>
      </nav>
    </div>
  </div>

  <div style="padding:2.5rem 1.5rem;background:var(--color-bg);min-height:70vh">
    <div class="ij-container">
      <div style="display:grid;grid-template-columns:1fr 320px;gap:2rem;align-items:start">

        <!-- Main content -->
        <div id="mainContent">
          <!-- Skeleton inicial -->
          <div class="detail-card" style="margin-bottom:1.5rem">
            <div class="skeleton-line" style="width:60%;margin-bottom:1rem"></div>
            <div class="skeleton-line" style="width:40%;margin-bottom:1.5rem"></div>
            <div class="ij-flex ij-gap-2" style="margin-bottom:1.5rem">
              <div class="skeleton-line" style="width:80px;height:.75rem"></div>
              <div class="skeleton-line" style="width:80px;height:.75rem"></div>
              <div class="skeleton-line" style="width:80px;height:.75rem"></div>
            </div>
            <div class="skeleton-line" style="width:100%;margin-bottom:.5rem"></div>
            <div class="skeleton-line" style="width:90%;margin-bottom:.5rem"></div>
            <div class="skeleton-line" style="width:80%"></div>
          </div>
        </div>

        <!-- Sidebar -->
        <div id="sidebar">
          <div class="company-card" style="margin-bottom:1rem">
            <div class="skeleton-line" style="width:50%;margin-bottom:.75rem"></div>
            <div class="skeleton-line" style="width:70%"></div>
          </div>
          <div class="skeleton-line" style="height:3rem;border-radius:var(--radius-lg)"></div>
        </div>

      </div>
    </div>
  </div>

  <script type="module">
    import { renderIcon } from '/js/icons.js';
    if (document.getElementById('nav-icon')) document.getElementById('nav-icon').innerHTML = renderIcon('briefcase');
  </script>
  <script type="module" src="/js/vacante.js"></script>
</body>
</html>
