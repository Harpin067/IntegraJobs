<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foros | IntegraJobs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Segoe UI', sans-serif; }
    /* Overlay para el modal de nuevo hilo */
    .forum-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      z-index: 1055; display: flex; align-items: center;
      justify-content: center; padding: 1rem;
    }
    @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:.4} }
    .skeleton { background:#e9ecef; border-radius:12px; animation:shimmer 1.5s ease-in-out infinite; }
  </style>
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/" style="color:#10b981;font-size:1.1rem">IntegraJobs</a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav mx-auto gap-1">
        <li class="nav-item"><a class="nav-link" href="/">Inicio</a></li>
        <li class="nav-item"><a class="nav-link" href="/busqueda.html">Empleos</a></li>
        <li class="nav-item"><a class="nav-link" href="/pages/recursos.html">Recursos</a></li>
        <li class="nav-item"><a class="nav-link fw-semibold text-primary" href="/pages/foros.html">Foros</a></li>
        <li class="nav-item"><a class="nav-link" href="/pages/login.html?type=empresa">Empresas</a></li>
      </ul>
      <div class="d-flex gap-2 mt-2 mt-lg-0">
        <a href="/pages/login.html" class="btn btn-outline-secondary btn-sm">Iniciar sesión</a>
        <a href="/pages/registro.html" class="btn btn-primary btn-sm">Registrarse</a>
      </div>
    </div>
  </div>
</nav>

<!-- Hero -->
<section style="background:linear-gradient(135deg,#0b1640,#0f2460);padding:3.5rem 1.5rem;text-align:center">
  <div class="container">
    <span class="badge rounded-pill mb-3 px-3 py-2"
          style="background:rgba(16,185,129,.2);color:#6ee7b7;border:1px solid rgba(16,185,129,.35);font-size:.8rem">
      Comunidad
    </span>
    <h1 style="color:#fff;font-size:clamp(1.75rem,4vw,2.5rem);font-weight:800;margin-bottom:.75rem;letter-spacing:-.02em">
      Foros de debate
    </h1>
    <p style="color:rgba(255,255,255,.7);max-width:34rem;margin:0 auto;font-size:1rem;line-height:1.65">
      Intercambia experiencias, haz preguntas y conecta con otros profesionales del mercado laboral salvadoreño.
    </p>
  </div>
</section>

<!-- Contenido principal -->
<section class="py-5">
  <div class="container" style="max-width:860px">

    <!-- Vista: categorías -->
    <div id="viewCategories">
      <h5 class="fw-bold mb-4">Categorías</h5>
      <div id="categoryList">
        <div class="skeleton mb-3" style="height:72px"></div>
        <div class="skeleton mb-3" style="height:72px;animation-delay:.15s"></div>
        <div class="skeleton mb-3" style="height:72px;animation-delay:.3s"></div>
      </div>
    </div>

    <!-- Vista: hilos de una categoría -->
    <div id="viewThreads" style="display:none">
      <button class="btn btn-link text-decoration-none text-secondary ps-0 mb-3" id="backToCategories">
        <i class="bi bi-arrow-left me-1"></i> Volver a categorías
      </button>
      <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <h5 id="categoryTitle" class="fw-bold mb-0"></h5>
        <button id="btnNuevoThread" class="btn btn-primary btn-sm">
          <i class="bi bi-plus-lg me-1"></i> Nuevo hilo
        </button>
      </div>
      <div id="threadList"></div>
    </div>

    <!-- Vista: hilo individual -->
    <div id="viewThread" style="display:none">
      <button class="btn btn-link text-decoration-none text-secondary ps-0 mb-3" id="backToThreads">
        <i class="bi bi-arrow-left me-1"></i> Volver a hilos
      </button>
      <div id="threadDetail"></div>

      <!-- Formulario de respuesta -->
      <div class="card border-0 shadow-sm mt-4">
        <div class="card-body">
          <h6 class="fw-semibold mb-3">Responder</h6>
          <div id="replyAlert" class="alert alert-danger d-none mb-3"></div>
          <textarea id="replyText" class="form-control mb-3" rows="4"
                    placeholder="Escribe tu respuesta..."></textarea>
          <div class="text-end">
            <button id="btnEnviarReply" class="btn btn-primary btn-sm">
              <i class="bi bi-send me-1"></i> Enviar respuesta
            </button>
          </div>
        </div>
      </div>
    </div>

  </div>
</section>

<!-- Modal: nuevo hilo -->
<div id="modalThread" style="display:none" class="forum-overlay">
  <div class="card border-0 shadow-lg" style="max-width:540px;width:100%;border-radius:12px;overflow:hidden">
    <div class="card-header bg-white border-bottom py-3">
      <h6 class="fw-semibold mb-0"><i class="bi bi-chat-square-text me-2"></i>Crear nuevo hilo</h6>
    </div>
    <div class="card-body p-4">
      <div id="threadAlert" class="alert alert-danger d-none mb-3"></div>
      <div class="mb-3">
        <label class="form-label small fw-semibold">Título</label>
        <input id="threadTitulo" class="form-control" placeholder="¿Sobre qué quieres debatir?">
      </div>
      <div class="mb-3">
        <label class="form-label small fw-semibold">Contenido</label>
        <textarea id="threadContenido" class="form-control" rows="5"
                  placeholder="Explica tu tema o pregunta en detalle..."></textarea>
      </div>
    </div>
    <div class="card-footer bg-white border-top d-flex justify-content-end gap-2 py-3">
      <button id="cancelThread" class="btn btn-outline-secondary btn-sm">Cancelar</button>
      <button id="submitThread" class="btn btn-primary btn-sm">
        <i class="bi bi-send me-1"></i> Publicar hilo
      </button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="/js/pages/foros.js"></script>
</body>
</html>
