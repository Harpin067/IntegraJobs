<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crear cuenta — IntegraJobs</title>
  <link rel="stylesheet" href="/css/theme.css">
</head>
<body>
  <div class="ij-auth-wrap">
    <div class="ij-auth-card" style="max-width:560px">
      <div class="ij-auth-brand"><a href="/">IntegraJobs</a></div>

      <div class="ij-card">
        <div class="ij-card-body">
          <h5 class="ij-text-lg ij-font-bold" style="text-align:center">¿Qué tipo de cuenta necesitas?</h5>
          <p class="ij-text-xs ij-text-muted ij-mb-4" style="text-align:center">Elige cómo quieres usar IntegraJobs</p>

          <div class="ij-grid ij-gap-3" style="grid-template-columns:1fr 1fr">
            <a href="/pages/registro-candidato.html" class="ij-card ij-card-hover" style="text-decoration:none;padding:1.5rem">
              <div class="ij-brand-icon" style="width:42px;height:42px;background:var(--color-primary-10);color:var(--color-primary);margin-bottom:.75rem"></div>
              <div class="ij-font-semibold">Soy candidato</div>
              <div class="ij-text-xs ij-text-muted ij-mt-1">Busco empleo y quiero postularme a vacantes verificadas.</div>
            </a>
            <a href="/pages/registro-empresa.html" class="ij-card ij-card-hover" style="text-decoration:none;padding:1.5rem">
              <div class="ij-brand-icon" style="width:42px;height:42px;background:rgba(16,185,129,.12);color:var(--color-secondary);margin-bottom:.75rem"></div>
              <div class="ij-font-semibold">Soy empresa</div>
              <div class="ij-text-xs ij-text-muted ij-mt-1">Quiero publicar vacantes y gestionar candidatos.</div>
            </a>
          </div>
        </div>
      </div>

      <p class="ij-text-xs ij-text-muted ij-mt-4" style="text-align:center">
        ¿Ya tienes cuenta? <a href="/pages/login.html">Inicia sesión</a>
      </p>
    </div>
  </div>
</body>
</html>
