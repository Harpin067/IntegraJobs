<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candidatos de la Vacante | IntegraJobs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/ij-app.css">
</head>
<body class="bg-light">

<div class="d-flex">

  <!-- Sidebar -->
  <div style="width:230px;min-height:100vh;background:linear-gradient(180deg,#0f172a,#1e3a8a);flex-shrink:0" class="d-flex flex-column text-white">
    <div class="p-3" style="border-bottom:1px solid rgba(255,255,255,.12)">
      <div class="fw-bold fs-6" style="color:#10b981">IntegraJobs</div>
      <small style="color:rgba(255,255,255,.5);font-size:.7rem">Panel Empresa</small>
    </div>
    <nav class="flex-grow-1 p-2">
      <a href="/pages/empresa/dashboard.html"     class="sidebar-link d-flex align-items-center gap-2 rounded px-3 py-2 mb-1"><i class="bi bi-grid"></i> Dashboard</a>
      <a href="/pages/empresa/vacantes.html"       class="sidebar-link active d-flex align-items-center gap-2 rounded px-3 py-2 mb-1"><i class="bi bi-file-text"></i> Mis Vacantes</a>
      <a href="/pages/empresa/crear-vacante.html"  class="sidebar-link d-flex align-items-center gap-2 rounded px-3 py-2 mb-1"><i class="bi bi-plus-circle"></i> Publicar Vacante</a>
      <a href="/pages/empresa/perfil.html"         class="sidebar-link d-flex align-items-center gap-2 rounded px-3 py-2 mb-1"><i class="bi bi-building"></i> Perfil</a>
    </nav>
    <div class="p-2" style="border-top:1px solid rgba(255,255,255,.12)">
      <a href="#" id="logoutBtn" class="sidebar-link d-flex align-items-center gap-2 rounded px-3 py-2 text-danger"><i class="bi bi-box-arrow-left"></i> Cerrar Sesión</a>
    </div>
  </div>

  <!-- Contenido -->
  <div class="flex-grow-1 p-4">

    <div class="mb-4">
      <a href="/pages/empresa/vacantes.html" class="text-muted small text-decoration-none">
        <i class="bi bi-arrow-left me-1"></i> Volver a Mis Vacantes
      </a>
      <h4 class="fw-bold mb-1 mt-2">Candidatos de la Vacante</h4>
      <p class="text-muted mb-0 small" id="vacancySubtitle">Cargando información…</p>
    </div>

    <div class="card border-0 shadow-sm mb-4" style="border-radius:12px;overflow:hidden">
      <div class="section-header d-flex align-items-center gap-2">
        <i class="bi bi-people fs-5"></i>
        <span class="fw-semibold">Postulantes</span>
      </div>
      <div class="card-body p-3" id="aplicantesList">
        <div class="text-center text-muted py-5">
          <div class="spinner-border spinner-border-sm mb-2" role="status"></div>
          <div>Cargando candidatos…</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="/js/pages/empresa/aplicaciones.js"></script>
<script type="module">
  import { logout } from '/js/auth.js';
  document.getElementById('logoutBtn').addEventListener('click', e => { e.preventDefault(); logout(); });
</script>
</body>
</html>
