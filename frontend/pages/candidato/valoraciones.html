<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valoraciones | IntegraJobs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/ij-app.css">
  <style>
    .star-btn { color: #dee2e6; background: none; border: none; cursor: pointer; font-size: 1.5rem; padding: .1rem; transition: color .1s; line-height: 1; }
  </style>
</head>
<body class="bg-light">

<div class="d-flex" style="min-height:100vh">

  <!-- Sidebar -->
  <div style="width:230px;min-height:100vh;background:linear-gradient(180deg,#0f172a,#1e3a8a);flex-shrink:0" class="d-flex flex-column text-white">
    <div class="p-3" style="border-bottom:1px solid rgba(255,255,255,.12)">
      <div class="fw-bold fs-6" style="color:#10b981">IntegraJobs</div>
      <small style="color:rgba(255,255,255,.5);font-size:.7rem">Portal Candidato</small>
    </div>
    <nav class="flex-grow-1 p-2">
      <a href="/pages/candidato/dashboard.html"   class="d-flex align-items-center gap-2 text-decoration-none rounded px-3 py-2 mb-1 sidebar-link" style="color:rgba(255,255,255,.7)"><i class="bi bi-grid"></i> Dashboard</a>
      <a href="/pages/candidato/busqueda.html"    class="d-flex align-items-center gap-2 text-decoration-none rounded px-3 py-2 mb-1 sidebar-link" style="color:rgba(255,255,255,.7)"><i class="bi bi-search"></i> Buscar Empleos</a>
      <a href="/pages/candidato/perfil.html"      class="d-flex align-items-center gap-2 text-decoration-none rounded px-3 py-2 mb-1 sidebar-link" style="color:rgba(255,255,255,.7)"><i class="bi bi-person-circle"></i> Mi Perfil</a>
      <a href="/pages/candidato/alertas.html"     class="d-flex align-items-center gap-2 text-decoration-none rounded px-3 py-2 mb-1 sidebar-link" style="color:rgba(255,255,255,.7)"><i class="bi bi-bell"></i> Alertas</a>
      <a href="/pages/candidato/valoraciones.html" class="d-flex align-items-center gap-2 text-decoration-none rounded px-3 py-2 mb-1 sidebar-link active" style="color:rgba(255,255,255,.7)"><i class="bi bi-star"></i> Valoraciones</a>
      <a href="/pages/candidato/foros.html"        class="d-flex align-items-center gap-2 text-decoration-none rounded px-3 py-2 mb-1 sidebar-link" style="color:rgba(255,255,255,.7)"><i class="bi bi-chat-square-text"></i> Foros</a>
    </nav>
    <div class="p-2" style="border-top:1px solid rgba(255,255,255,.12)">
      <a href="#" id="logoutBtn" class="d-flex align-items-center gap-2 text-decoration-none rounded px-3 py-2 text-danger sidebar-link"><i class="bi bi-box-arrow-left"></i> Cerrar Sesión</a>
    </div>
  </div>

  <!-- Contenido -->
  <div class="flex-grow-1 p-4">
    <div style="max-width:760px;margin:0 auto">

      <div class="mb-4">
        <h4 class="fw-bold mb-1">Valoraciones de Empresas</h4>
        <p class="text-muted small mb-0">Comparte tu experiencia y ayuda a otros candidatos a elegir mejor.</p>
      </div>

      <div id="successMsg" class="alert alert-success d-none mb-3"></div>
      <div id="errorMsg"   class="alert alert-danger  d-none mb-3"></div>

      <!-- Formulario para valorar -->
      <div class="card border-0 shadow-sm mb-4" style="border-radius:12px;overflow:hidden">
        <div class="section-header d-flex align-items-center gap-2">
          <i class="bi bi-star fs-5"></i>
          <span class="fw-semibold">Valorar empresa</span>
          <small class="ms-2 opacity-75" style="font-weight:400">Empresas en las que has postulado</small>
        </div>
        <div class="card-body">
          <form id="reviewForm">
            <div class="mb-3">
              <label class="form-label small fw-semibold">Empresa (selecciona de tus postulaciones)</label>
              <select id="reviewCompany" class="form-select" required>
                <option value="">Cargando empresas...</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label small fw-semibold d-block">Calificación</label>
              <div id="starRating" class="d-flex gap-1 mt-1">
                <button type="button" data-star="1" class="star-btn">★</button>
                <button type="button" data-star="2" class="star-btn">★</button>
                <button type="button" data-star="3" class="star-btn">★</button>
                <button type="button" data-star="4" class="star-btn">★</button>
                <button type="button" data-star="5" class="star-btn">★</button>
              </div>
              <input type="hidden" id="reviewRating" value="0">
            </div>
            <div class="mb-3">
              <label class="form-label small fw-semibold">Comentario</label>
              <textarea id="reviewComentario" class="form-control" rows="4"
                        placeholder="Cuenta tu experiencia con esta empresa..." required></textarea>
            </div>
            <div class="text-end">
              <button type="submit" class="btn btn-primary">
                <i class="bi bi-send me-1"></i> Enviar valoración
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- Mis valoraciones -->
      <div class="card border-0 shadow-sm" style="border-radius:12px;overflow:hidden">
        <div class="section-header d-flex align-items-center gap-2">
          <i class="bi bi-star-half fs-5"></i>
          <span class="fw-semibold">Mis valoraciones</span>
        </div>
        <div class="card-body" id="myReviews">
          <div class="text-center text-muted py-4">
            <div class="spinner-border spinner-border-sm mb-2" role="status"></div>
            <div class="small">Cargando valoraciones...</div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="/js/pages/candidato/valoraciones.js"></script>
<script type="module">
  import { logout } from '/js/auth.js';
  document.getElementById('logoutBtn').addEventListener('click', e => { e.preventDefault(); logout(); });
</script>
</body>
</html>
