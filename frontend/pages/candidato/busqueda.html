<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Buscar Empleos — IntegraJobs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/ij-app.css">
</head>
<body class="bg-light">

<div class="d-flex" style="min-height:100vh">

  <!-- Sidebar -->
  <div style="width:230px;min-height:100vh;background:linear-gradient(180deg,#0f172a,#1e3a8a);flex-shrink:0" class="d-flex flex-column text-white">
    <div class="p-3" style="border-bottom:1px solid rgba(255,255,255,.12)">
      <div class="fw-bold fs-6" style="color:#10b981">IntegraJobs</div>
      <small style="color:rgba(255,255,255,.5);font-size:.7rem">Portal Candidato</small>
    </div>
    <nav class="flex-grow-1 p-2">
      <a href="/pages/candidato/dashboard.html" class="d-flex align-items-center gap-2 text-decoration-none rounded px-3 py-2 mb-1 sidebar-link" style="color:rgba(255,255,255,.7)"><i class="bi bi-grid"></i> Dashboard</a>
      <a href="/pages/candidato/busqueda.html" class="d-flex align-items-center gap-2 text-decoration-none rounded px-3 py-2 mb-1 sidebar-link active" style="color:rgba(255,255,255,.7)"><i class="bi bi-search"></i> Buscar Empleos</a>
      <a href="/pages/candidato/perfil.html" class="d-flex align-items-center gap-2 text-decoration-none rounded px-3 py-2 mb-1 sidebar-link" style="color:rgba(255,255,255,.7)"><i class="bi bi-person-circle"></i> Mi Perfil</a>
      <a href="/pages/candidato/alertas.html" class="d-flex align-items-center gap-2 text-decoration-none rounded px-3 py-2 mb-1 sidebar-link" style="color:rgba(255,255,255,.7)"><i class="bi bi-bell"></i> Alertas</a>
      <a href="/pages/candidato/valoraciones.html" class="d-flex align-items-center gap-2 text-decoration-none rounded px-3 py-2 mb-1 sidebar-link" style="color:rgba(255,255,255,.7)"><i class="bi bi-star"></i> Valoraciones</a>
      <a href="/pages/candidato/foros.html"        class="d-flex align-items-center gap-2 text-decoration-none rounded px-3 py-2 mb-1 sidebar-link" style="color:rgba(255,255,255,.7)"><i class="bi bi-chat-square-text"></i> Foros</a>
    </nav>
    <div class="p-2" style="border-top:1px solid rgba(255,255,255,.12)">
      <a href="#" id="logoutBtn" class="d-flex align-items-center gap-2 text-decoration-none rounded px-3 py-2 text-danger sidebar-link"><i class="bi bi-box-arrow-left"></i> Cerrar Sesión</a>
    </div>
  </div>

  <!-- Contenido principal -->
  <div class="flex-grow-1 p-4">

    <!-- Encabezado -->
    <div class="mb-4">
      <h1 class="h4 fw-bold mb-1">Buscar Vacantes</h1>
      <p class="text-muted small mb-0">Descubre las oportunidades que mejor se adapten a ti.</p>
    </div>

    <!-- Formulario de búsqueda -->
    <div class="card border-0 shadow-sm mb-4">
      <div class="card-body">
        <div class="row g-2 align-items-end">
          <div class="col-md-4">
            <label class="form-label small fw-semibold">Palabra clave</label>
            <input type="text" id="q" class="form-control" placeholder="Título, empresa...">
          </div>
          <div class="col-md-2">
            <label class="form-label small fw-semibold">Modalidad</label>
            <select id="fTrabajo" class="form-select">
              <option value="">Todas</option>
              <option value="presencial">Presencial</option>
              <option value="remoto">Remoto</option>
              <option value="hibrido">Híbrido</option>
            </select>
          </div>
          <div class="col-md-2">
            <label class="form-label small fw-semibold">Contrato</label>
            <select id="fContrato" class="form-select">
              <option value="">Todos</option>
              <option value="completo">Tiempo completo</option>
              <option value="medio">Medio tiempo</option>
              <option value="temporal">Temporal</option>
              <option value="freelance">Freelance</option>
            </select>
          </div>
          <div class="col-md-2">
            <label class="form-label small fw-semibold">Experiencia</label>
            <select id="fExp" class="form-select">
              <option value="">Todas</option>
              <option value="junior">Junior</option>
              <option value="mid">Mid</option>
              <option value="senior">Senior</option>
              <option value="lead">Lead</option>
            </select>
          </div>
          <div class="col-md-2">
            <button id="btnBuscar" class="btn btn-primary w-100">
              <i class="bi bi-search me-1"></i> Buscar
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Resultados -->
    <div id="resultados">
      <p class="text-muted small">Cargando vacantes...</p>
    </div>

  </div>
</div>

<!-- Modal para postularse -->
<div class="modal fade" id="modalPostular" tabindex="-1" aria-labelledby="modalPostularLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalPostularLabel">Postular a vacante</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="postularAlert" class="alert alert-danger d-none"></div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Mensaje (opcional)</label>
          <textarea id="pmMensaje" class="form-control" rows="4"
            placeholder="Cuéntale a la empresa por qué eres el candidato ideal..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" id="btnEnviarPostulacion" class="btn btn-primary">Enviar postulación</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="/js/pages/candidato/busqueda.js"></script>
<script type="module">
  import { logout } from '/js/auth.js';
  document.getElementById('logoutBtn').addEventListener('click', e => { e.preventDefault(); logout(); });
</script>
</body>
</html>
