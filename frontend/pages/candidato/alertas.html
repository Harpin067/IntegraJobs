<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alertas | IntegraJobs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/ij-app.css">
</head>
<body class="bg-light">

<div class="d-flex" style="min-height:100vh">

  <!-- Sidebar -->
  <div style="width:230px;min-height:100vh;background:linear-gradient(180deg,#0f172a,#1e3a8a);flex-shrink:0" class="d-flex flex-column text-white">
    <div class="p-3" style="border-bottom:1px solid rgba(255,255,255,.12)">
      <div class="fw-bold fs-6" style="color:#10b981">IntegraJobs</div>
      <small style="color:rgba(255,255,255,.5);font-size:.7rem">Portal Candidato</small>
    </div>
    <nav class="flex-grow-1 p-2">
      <a href="/pages/candidato/dashboard.html"   class="d-flex align-items-center gap-2 text-decoration-none rounded px-3 py-2 mb-1 sidebar-link" style="color:rgba(255,255,255,.7)"><i class="bi bi-grid"></i> Dashboard</a>
      <a href="/pages/candidato/busqueda.html"    class="d-flex align-items-center gap-2 text-decoration-none rounded px-3 py-2 mb-1 sidebar-link" style="color:rgba(255,255,255,.7)"><i class="bi bi-search"></i> Buscar Empleos</a>
      <a href="/pages/candidato/perfil.html"      class="d-flex align-items-center gap-2 text-decoration-none rounded px-3 py-2 mb-1 sidebar-link" style="color:rgba(255,255,255,.7)"><i class="bi bi-person-circle"></i> Mi Perfil</a>
      <a href="/pages/candidato/alertas.html"     class="d-flex align-items-center gap-2 text-decoration-none rounded px-3 py-2 mb-1 sidebar-link active" style="color:rgba(255,255,255,.7)"><i class="bi bi-bell"></i> Alertas</a>
      <a href="/pages/candidato/valoraciones.html" class="d-flex align-items-center gap-2 text-decoration-none rounded px-3 py-2 mb-1 sidebar-link" style="color:rgba(255,255,255,.7)"><i class="bi bi-star"></i> Valoraciones</a>
      <a href="/pages/candidato/foros.html"        class="d-flex align-items-center gap-2 text-decoration-none rounded px-3 py-2 mb-1 sidebar-link" style="color:rgba(255,255,255,.7)"><i class="bi bi-chat-square-text"></i> Foros</a>
    </nav>
    <div class="p-2" style="border-top:1px solid rgba(255,255,255,.12)">
      <a href="#" id="logoutBtn" class="d-flex align-items-center gap-2 text-decoration-none rounded px-3 py-2 text-danger sidebar-link"><i class="bi bi-box-arrow-left"></i> Cerrar Sesión</a>
    </div>
  </div>

  <!-- Contenido -->
  <div class="flex-grow-1 p-4">
    <div style="max-width:760px;margin:0 auto">

      <div class="mb-4">
        <h4 class="fw-bold mb-1">Panel de Alertas</h4>
        <p class="text-muted small mb-0">Recibe notificaciones cuando se publiquen vacantes que coincidan con tus criterios.</p>
      </div>

      <div id="successMsg" class="alert alert-success d-none mb-3"></div>
      <div id="errorMsg"   class="alert alert-danger  d-none mb-3"></div>

      <!-- Formulario para crear alerta -->
      <div class="card border-0 shadow-sm mb-4" style="border-radius:12px;overflow:hidden">
        <div class="section-header d-flex align-items-center gap-2">
          <i class="bi bi-bell-plus fs-5"></i>
          <span class="fw-semibold">Nueva alerta</span>
        </div>
        <div class="card-body">
          <form id="alertaForm">
            <div class="row g-2 align-items-end">
              <div class="col-md-4">
                <label class="form-label small fw-semibold">Palabra clave</label>
                <input id="aKeyword" class="form-control" placeholder="Ej. Desarrollador, Diseñador..." required>
              </div>
              <div class="col-md-3">
                <label class="form-label small fw-semibold">Ubicación</label>
                <input id="aUbicacion" class="form-control" placeholder="Ej. San Salvador">
              </div>
              <div class="col-md-3">
                <label class="form-label small fw-semibold">Modalidad</label>
                <select id="aTipoTrabajo" class="form-select">
                  <option value="">Cualquiera</option>
                  <option value="presencial">Presencial</option>
                  <option value="remoto">Remoto</option>
                  <option value="hibrido">Híbrido</option>
                </select>
              </div>
              <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">
                  <i class="bi bi-plus-lg"></i> Crear
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>

      <!-- Lista de alertas -->
      <div class="card border-0 shadow-sm" style="border-radius:12px;overflow:hidden">
        <div class="section-header d-flex align-items-center gap-2">
          <i class="bi bi-bell fs-5"></i>
          <span class="fw-semibold">Mis alertas</span>
        </div>
        <div class="card-body" id="alertasList">
          <div class="text-center text-muted py-4">
            <div class="spinner-border spinner-border-sm mb-2" role="status"></div>
            <div class="small">Cargando alertas...</div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="/js/pages/candidato/alertas.js"></script>
<script type="module">
  import { logout } from '/js/auth.js';
  document.getElementById('logoutBtn').addEventListener('click', e => { e.preventDefault(); logout(); });
</script>
</body>
</html>
