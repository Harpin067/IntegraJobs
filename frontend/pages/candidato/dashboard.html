<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard — IntegraJobs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/ij-app.css">
</head>
<body class="bg-light">

<div class="d-flex" style="min-height:100vh">

  <!-- Sidebar -->
  <div style="width:230px;min-height:100vh;background:linear-gradient(180deg,#0f172a,#1e3a8a);flex-shrink:0" class="d-flex flex-column text-white">
    <div class="p-3" style="border-bottom:1px solid rgba(255,255,255,.12)">
      <div class="fw-bold fs-6" style="color:#10b981">IntegraJobs</div>
      <small style="color:rgba(255,255,255,.5);font-size:.7rem">Portal Candidato</small>
    </div>
    <nav class="flex-grow-1 p-2">
      <a href="/pages/candidato/dashboard.html" class="d-flex align-items-center gap-2 text-decoration-none rounded px-3 py-2 mb-1 sidebar-link active" style="color:rgba(255,255,255,.7)"><i class="bi bi-grid"></i> Dashboard</a>
      <a href="/pages/candidato/busqueda.html" class="d-flex align-items-center gap-2 text-decoration-none rounded px-3 py-2 mb-1 sidebar-link" style="color:rgba(255,255,255,.7)"><i class="bi bi-search"></i> Buscar Empleos</a>
      <a href="/pages/candidato/perfil.html" class="d-flex align-items-center gap-2 text-decoration-none rounded px-3 py-2 mb-1 sidebar-link" style="color:rgba(255,255,255,.7)"><i class="bi bi-person-circle"></i> Mi Perfil</a>
      <a href="/pages/candidato/alertas.html" class="d-flex align-items-center gap-2 text-decoration-none rounded px-3 py-2 mb-1 sidebar-link" style="color:rgba(255,255,255,.7)"><i class="bi bi-bell"></i> Alertas</a>
      <a href="/pages/candidato/valoraciones.html" class="d-flex align-items-center gap-2 text-decoration-none rounded px-3 py-2 mb-1 sidebar-link" style="color:rgba(255,255,255,.7)"><i class="bi bi-star"></i> Valoraciones</a>
      <a href="/pages/candidato/foros.html"        class="d-flex align-items-center gap-2 text-decoration-none rounded px-3 py-2 mb-1 sidebar-link" style="color:rgba(255,255,255,.7)"><i class="bi bi-chat-square-text"></i> Foros</a>
    </nav>
    <div class="p-2" style="border-top:1px solid rgba(255,255,255,.12)">
      <a href="#" id="logoutBtn" class="d-flex align-items-center gap-2 text-decoration-none rounded px-3 py-2 text-danger sidebar-link"><i class="bi bi-box-arrow-left"></i> Cerrar Sesión</a>
    </div>
  </div>

  <!-- Contenido principal -->
  <div class="flex-grow-1 p-4">

    <!-- Encabezado -->
    <div class="d-flex justify-content-between align-items-start mb-4">
      <div>
        <h1 class="h4 fw-bold mb-1">Dashboard</h1>
        <p class="text-muted small mb-0">Aquí tienes un resumen de tu actividad.</p>
      </div>
      <a href="/pages/candidato/busqueda.html" class="btn btn-primary btn-sm">
        <i class="bi bi-briefcase me-1"></i> Buscar empleos
      </a>
    </div>

    <!-- Tarjetas de estadísticas -->
    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <div class="card border-0 shadow-sm h-100">
          <div class="card-body">
            <div class="d-flex align-items-center gap-3">
              <div class="rounded p-2" style="background:rgba(26,86,219,.1);color:#1a56db">
                <i class="bi bi-file-text fs-5"></i>
              </div>
              <div>
                <div class="fw-bold fs-4" id="statPostulaciones">—</div>
                <div class="text-muted small">Postulaciones</div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card border-0 shadow-sm h-100">
          <div class="card-body">
            <div class="d-flex align-items-center gap-3">
              <div class="rounded p-2" style="background:rgba(16,185,129,.1);color:#10b981">
                <i class="bi bi-eye fs-5"></i>
              </div>
              <div>
                <div class="fw-bold fs-4" id="statEnProceso">—</div>
                <div class="text-muted small">En proceso</div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card border-0 shadow-sm h-100">
          <div class="card-body">
            <div class="d-flex align-items-center gap-3">
              <div class="rounded p-2" style="background:rgba(245,158,11,.12);color:#f59e0b">
                <i class="bi bi-briefcase fs-5"></i>
              </div>
              <div>
                <div class="fw-bold fs-4" id="statVacantes">—</div>
                <div class="text-muted small">Vacantes activas</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Sección de dos columnas -->
    <div class="row g-3">

      <!-- Postulaciones recientes -->
      <div class="col-lg-8">
        <div class="card border-0 shadow-sm h-100" style="border-radius:12px;overflow:hidden">
          <div class="section-header d-flex align-items-center gap-2">
            <i class="bi bi-file-text fs-5"></i>
            <span class="fw-semibold">Postulaciones recientes</span>
          </div>
          <div class="card-body" id="listaPostulaciones">
            <p class="text-muted small">Cargando...</p>
          </div>
        </div>
      </div>

      <!-- Vacantes recientes -->
      <div class="col-lg-4">
        <div class="card border-0 shadow-sm h-100" style="border-radius:12px;overflow:hidden">
          <div class="section-header d-flex align-items-center gap-2">
            <i class="bi bi-lightning fs-5"></i>
            <span class="fw-semibold">Vacantes recientes</span>
          </div>
          <div class="card-body" id="listaVacantes">
            <p class="text-muted small">Cargando...</p>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="/js/pages/candidato/dashboard.js"></script>
<script type="module">
  import { logout } from '/js/auth.js';
  document.getElementById('logoutBtn').addEventListener('click', e => { e.preventDefault(); logout(); });
</script>
</body>
</html>
