<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recursos | IntegraJobs Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/ij-app.css">
</head>
<body class="bg-light">

<div class="d-flex">

  <!-- Sidebar -->
  <div style="width:230px;min-height:100vh;background:linear-gradient(180deg,#0f172a,#1e3a8a);flex-shrink:0" class="d-flex flex-column text-white">
    <div class="p-3" style="border-bottom:1px solid rgba(255,255,255,.12)">
      <div class="fw-bold fs-6" style="color:#10b981">IntegraJobs</div>
      <small style="color:rgba(255,255,255,.5);font-size:.7rem">Panel Administrador</small>
    </div>
    <nav class="flex-grow-1 p-2">
      <a href="/pages/admin/dashboard.html"    class="sidebar-link d-flex align-items-center gap-2 rounded px-3 py-2 mb-1"><i class="bi bi-grid"></i> Dashboard</a>
      <a href="/pages/admin/usuarios.html"     class="sidebar-link d-flex align-items-center gap-2 rounded px-3 py-2 mb-1"><i class="bi bi-people"></i> Usuarios</a>
      <a href="/pages/admin/empresas.html"     class="sidebar-link d-flex align-items-center gap-2 rounded px-3 py-2 mb-1"><i class="bi bi-building"></i> Empresas</a>
      <a href="/pages/admin/valoraciones.html" class="sidebar-link d-flex align-items-center gap-2 rounded px-3 py-2 mb-1"><i class="bi bi-star"></i> Valoraciones</a>
      <a href="/pages/admin/foros.html"        class="sidebar-link d-flex align-items-center gap-2 rounded px-3 py-2 mb-1"><i class="bi bi-chat-square-text"></i> Foros</a>
      <a href="/pages/admin/recursos.html"     class="sidebar-link active d-flex align-items-center gap-2 rounded px-3 py-2 mb-1"><i class="bi bi-collection"></i> Recursos</a>
    </nav>
    <div class="p-2" style="border-top:1px solid rgba(255,255,255,.12)">
      <a href="#" id="logoutBtn" class="sidebar-link d-flex align-items-center gap-2 rounded px-3 py-2 text-danger"><i class="bi bi-box-arrow-left"></i> Cerrar Sesión</a>
    </div>
  </div>

  <!-- Contenido -->
  <div class="flex-grow-1 p-4">

    <!-- Encabezado -->
    <div class="d-flex align-items-start justify-content-between mb-4">
      <div>
        <h4 class="fw-bold mb-1">Gestión de Recursos</h4>
        <p class="text-muted small mb-0">Artículos, tutoriales y videos que aparecen en la landing.</p>
      </div>
      <button class="btn btn-primary d-flex align-items-center gap-2" data-bs-toggle="modal" data-bs-target="#modalRecurso">
        <i class="bi bi-plus-lg"></i> Nuevo recurso
      </button>
    </div>

    <!-- Alerta de feedback -->
    <div id="alertaGlobal" class="alert d-none mb-3" role="alert"></div>

    <!-- Tabla -->
    <div class="card border-0 shadow-sm" style="border-radius:12px;overflow:hidden">
      <div class="section-header d-flex align-items-center gap-2">
        <i class="bi bi-collection fs-5"></i>
        <span class="fw-semibold">Listado de recursos</span>
        <span class="ms-auto badge bg-secondary rounded-pill" id="badgeTotal">0</span>
      </div>

      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0" style="font-size:.875rem">
          <thead style="background:#f8fafc;border-bottom:2px solid #e2e8f0">
            <tr>
              <th class="px-3 py-3" style="width:36%">Título</th>
              <th class="px-3 py-3" style="width:11%">Tipo</th>
              <th class="px-3 py-3" style="width:13%">Estado</th>
              <th class="px-3 py-3" style="width:16%">Creado</th>
              <th class="px-3 py-3 text-end" style="width:24%">Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaBody">
            <tr id="rowCargando">
              <td colspan="5" class="text-center py-5 text-muted">
                <div class="spinner-border spinner-border-sm mb-2" role="status"></div>
                <div class="small">Cargando recursos...</div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- Modal: Nuevo recurso -->
<div class="modal fade" id="modalRecurso" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <div class="modal-header" style="background:linear-gradient(90deg,#0f172a,#1e3a8a);color:#fff">
        <h5 class="modal-title fw-bold"><i class="bi bi-plus-circle me-2"></i>Nuevo recurso</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <form id="formRecurso" novalidate>
        <div class="modal-body p-4">

          <div id="alertaModal" class="alert alert-danger d-none mb-3" role="alert"></div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Título <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="fTitulo" name="titulo"
                   placeholder="Ej. Cómo preparar tu CV para 2025" maxlength="200" required>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Tipo <span class="text-danger">*</span></label>
              <select class="form-select" id="fTipo" name="tipo" required>
                <option value="" disabled selected>Selecciona un tipo</option>
                <option value="articulo">Artículo</option>
                <option value="tutorial">Tutorial</option>
                <option value="video">Video</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">URL de imagen <span class="text-muted fw-normal">(opcional)</span></label>
              <input type="url" class="form-control" id="fImagenUrl" name="imagenUrl"
                     placeholder="https://ejemplo.com/imagen.jpg">
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Contenido / Descripción <span class="text-danger">*</span></label>
            <textarea class="form-control" id="fContenido" name="contenido" rows="5"
                      placeholder="Escribe el cuerpo del recurso o una descripción detallada..." required></textarea>
          </div>

          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="fPublicado" name="isPublished">
            <label class="form-check-label" for="fPublicado">Publicar inmediatamente en la landing</label>
          </div>

        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="btnGuardar">
            <i class="bi bi-save me-1"></i> Guardar recurso
          </button>
        </div>
      </form>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="/js/pages/admin/recursos.js"></script>
<script type="module">
  import { logout } from '/js/auth.js';
  document.getElementById('logoutBtn').addEventListener('click', e => { e.preventDefault(); logout(); });
</script>
</body>
</html>
